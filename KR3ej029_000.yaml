body:
  text: 四診總括兒科自古最為難毫釐之差千里愆氣血未充難據脈神識未發不知言惟憑面色識因病再向三關診熱寒聽聲審病兼切脈表裡虛實隨證參察色欲識小兒百病原先從面部色詳觀五部五色應五臟誠中形外理昭然額心頦腎鼻脾位右腮屬肺左屬肝青肝赤心黃脾色白為肺色黑腎顏青主驚風赤火熱黃傷脾食白虛寒黑色主痛多惡候明顯濁晦輕重參部色相生為病順部色相剋病多難相生實者邪助病相剋虛者正難堪天庭青暗驚風至紅主內熱黑難痊太陽青驚入耳惡印堂青色驚瀉纏風氣青驚紫吐逆兩眉青吉紅熱煩鼻赤脾熱黑則死唇赤脾熱白脾寒左腮赤色肝經熱右腮發赤肺熱痰承漿青驚黃嘔吐黑主抽搐病纏綿此是察色之大要還將脈證一同參聽聲診兒之法聽五聲聆音察理始能明五聲相應五臟病五聲不和五臟情心病聲急多言笑肺病聲悲音不清肝病聲呼多狂叫脾病聲歌音顫輕腎病聲呻長且細五音昭著證分明啼而不哭知腹痛哭而不啼將作驚咨煎不安心煩熱嗄聲聲重感寒風有餘聲雄多壯厲不足聲短怯而輕多言體熱陽腑證懶語身冷陰臟形狂言焦躁邪熱盛譫語神昏病熱凶鴨聲在喉音不出直聲無淚命將傾虛實寒熱從聲別聞而知之無遁情審病審兒之病貴詳參要在安煩苦欲間能食不食渴不渴二便調和通祕勘發熱無汗為表病內熱便硬作里看安煩晝夜陰陽證苦欲冷暖定熱寒能食不食胃壯弱渴與不渴胃濕干便稠黏穢為滯熱尿清不赤乃寒占耳尻肢涼知痘疹指梢發冷主驚癇肚腹熱悶乃內熱四肢厥冷是中寒眉皺曲啼腹作痛風熱來臨耳熱纏腹痛須按軟與硬喜按不喜虛實參欲保赤子誠心辨對證施方治不難切脈小兒周歲當切脈位小一指定三關浮脈輕取皮膚得沉脈重取筋骨間一息六至平和脈過則為數減遲傳滑脈如珠多流利澀脈滯澀往來艱三部無力為虛脈三部有力作實言中取無力為芤脈微脈微細有無間洪脈來盛去無力數緩時止促結占緊脈左右如轉索弦則端直張弓弦浮為在表外感病沉為在裡內傷端數為在腑屬陽熱遲為在臟乃陰寒滑痰洪火微怯弱弦飲結聚促驚癇芤主失血澀血少沉緊腹痛浮感寒虛主諸虛不足病實主諸實有餘看痘疹欲發脈洪緊大小不勻中惡勘一息三至虛寒極九至十至熱極炎一二十一十二死浮散無根沉伏難表裡陰陽虛實診惟在兒科隨證參虎口三關部位脈紋形色初生小兒診虎口男從左手女右看次指三節風氣命脈紋形色隱隱安形見色變知有病紫屬內熱紅傷寒黃主脾病黑中惡青主驚風白是疳風關病輕氣關重命關若見命多難大小曲紫傷滯熱曲青人驚走獸占赤色水火飛禽撲黃色雷驚黑陰癇長珠傷食流珠熱去蛇吐瀉來蛇疳弓里感冒外痰熱左斜傷風右斜寒針形槍形主痰熱射指射甲命難全紋見乙字為抽搐二曲如鉤傷冷傳三曲如蟲傷硬物水紋咳嗽吐瀉環積滯曲蟲驚魚骨形如亂蟲有蛔纏脈紋形色相參合醫者留神仔細觀風關次指第一節氣關次指第二節命關次指第三節虎口叉手處也男先看左手次指內側女先看右手次指內側初生門上拭口附下胎毒法拭口須用胭脂法穢淨方無口病生古云未啼先取穢只緣未察此中情甘草法甘草之法自古稱能解諸毒性味平濃煎頻令兒吮服免使胎毒蘊腹中黃連法素稟胎熱蘊於中惟有黃連法最靈水浸濃汁滴口內臍糞胎毒自此清朱蜜法朱蜜鎮神利腸胃清熱防驚大有功胎熱便祕皆堪用稟賦怯弱慎而行豆豉法怯弱之兒豆豉法宣發胎毒功最良兒生冬月亦宜此煎取濃汁當乳嘗斷臍臍帶剪下即用烙男女六寸始合宜烙臍方灸法防風襲胡粉方封臍為避濕附方烙臍餅子豆豉黃蠟等分麝香少許以豆豉麝香研勻熔蠟量臍大小捻為餅灸用胡粉散胡粉甑帶灰乾薑白石脂棉灰各等分麝香少許共為細未每用一錢敷臍上封之浴兒浴兒之法五枝湯冬夏寒溫適可當加豬膽汁去汙穢且滋肌膚免生瘡不啼小兒生下不能啼俗語名之為草迷多因臨産難生育或值嚴寒氣所逼氣閉不通聲不出奄奄呼吸命須臾氣閉不通蔥鞭背寒逼急用火熏臍鞭背法小兒初生氣不通奄奄呼吸少啼聲用蔥鞭背輕輕擊須臾聲發可回生熏臍帶法小兒生下或冒寒氣閉無聲啼則難油捻熏臍休剪帶暖氣入腹自通安不乳兒生能乳本天然若不吮兮必有緣腹中穢惡未下淨或在胎中素稟寒穢惡不淨一捻方效胎寒不乳勻氣方先若更面青肢冷厥此是寒虛理中方煎附方一捻金大黃生黑醜白醜人參檳榔各等分上為細末每少許蜜水調服勻氣散陳皮桔梗各一錢炮姜砂仁炙甘草各五分木香三分共為細末每服五分紅棗煎湯調服理中湯人參白朮土炒乾薑甘草炙引用紅棗肉水煎服方歌理中人參並乾薑白朮甘草共為湯胎寒諸疾皆當服不乳肢冷更堪嘗眼不開兒生眼閉不能開皆因脾熱受於胎內用地黃湯方最妙熊膽方洗目效靈哉附方生地黃湯生地黃赤芍藥川芎當歸天花粉甘草生水煎服方歌目閉不開胎熱成生地黃湯赤芍芎當歸花粉生地草水煎速服莫消停熊膽洗法熊膽黃連各少許用滾湯淬洗其目自開藥物煅紅投水中叫淬吐不止兒吐不止何因生穢惡停留胃內成或緣稟賦胎寒熱或因生時感寒風穢惡一捻金方散下外感香蘇方溫散能熱涎酸黏連陳方治寒吐清沫用理中方附方一捻金香蘇飲藿香蘇葉厚朴姜炒陳皮茯苓木香煨枳殼麩炒炙甘草引用生薑水煎服方歌香蘇飲用藿香蘇厚朴陳皮枳殼茯甘草木香一併入生薑為引吐能除黃連二陳湯半夏薑製陳皮茯苓生甘草黃連引用生薑水煎服方歌兒生胎熱吐頻頻醫治須當用二陳半夏陳皮茯苓草姜連加入效如神理中湯不小便小便不通胎熱壅異赤方八正方二方從外用豆豉方貼臍法須臾小便自能通附方導赤散生地黃木通甘草生引用燈心竹葉水煎服加黃連滑石赤苓更妙方歌方名導赤妙難言生地木通甘草煎引用燈心共竹葉清熱利水便如泉八正散扁蓄瞿麥滑石飛木通赤苓車前子生大黃梔子生引用燈心水煎服方歌八正散治小便祕扁蓄瞿麥車前利木通滑石赤茯苓大黃梔子合成劑豆豉膏淡豆豉一勺田螺十九個蔥一大束搗爛用芭蕉汁調貼臍上不大便大便不通名鎖肚皆緣熱毒受胎中朱蜜方捻金方俱可用急咂五心臍下通附方朱蜜法一捻金大小便不通二便俱祕胎熱極木通散方與紫霜丸方行熱開結真神妙口嘬之法悉如前附方木通散車前子扁蓄瞿麥木通赤苓山梔滑石飛黃芩生甘草大黃引用燈心水煎服或入薄荷同煎方歌二便閉兮如何醫木通散用甚為奇車蓄瞿通苓梔子滑芩甘草大黃宜紫霜丸代赭石火煨醋浸三五次研一兩赤石脂一兩杏仁炒去皮尖六十粒巴豆去油膜三十粒上研細末飯糊如麻子大日服三丸白水下肛門內合有因熱毒肛門結或是內合無隙通清毒宜服黑白散方脂瞞簪通導法精附方黑白散黑牽牛半生半炒白牽牛半生半炒生大黃檳榔陳皮各五錢生甘草三錢元明粉一錢上除檳榔不過火餘五味或曬或焙仍合檳榔為末同元明粉入乳鉢內研細每服五分至六七分溫蜜湯化服噤口噤口舌上如黍米吮乳不得啼漸難清肝龍膽湯方極妙腹硬便祕紫霜丸方吐涎牙緊擦牙方效次用辰砂全蠍煎方病勢稍安勿過劑調和脾胃勻氣方先附方龍膽湯柴胡黃芩生甘草釣藤鉤赤芍大黃紙裹煨龍膽草蜣螂去翅足桔梗赤茯苓引用棗肉水煎服方歌噤口龍膽湯極靈柴胡黃芩草鉤藤赤芍大黃龍膽草蜣螂桔梗赤茯苓紫霜丸祕方擦牙散生南星去皮臍二錢龍腦少許研為極細末用指蘸合生薑汁放大牙根擦之立效如不開者將應用之藥調和稀糊含在不病人口內以筆管插入病人之鼻孔用氣將藥吹入辰砂全蠍散辰砂水飛五分全蠍去毒三枚硼砂龍腦麝香各一分上為極細末用乳母唾調抹口唇里及齒上勻氣散撮口撮如囊口吮乳難舌強唇青吐沫痰面色赤黃胎熱極四肢厥冷命難全痰盛宜用殭蠶散方便祕須進紫霜丸方驚熱龍膽湯方極妙抽搐撮風散方自安附方辰砂殭蠶散辰砂水飛五分殭蠶直的去系嘴炒一錢蛇蛻皮炒一錢麝香五分上為末用蜜調敷唇口紫霜丸龍膽湯撮風散赤腳蜈蚣炙半條釣藤鉤一錢五分硃砂水飛直殭蠶焙全蠍尾各一錢麝香一字上為末每服一字竹瀝調下臍濕臍瘡浴兒不慎水浸臍或因繃袍濕漬之臍間淋漓多痛癢甚則焮腫作瘡痍臍濕必用滲臍散方瘡腫金黃散方最宜治療之法須如此臨證施之不可疑附方滲臍散枯礬龍骨煅各二錢麝香少許研細末干撒臍中金黃散川黃連二錢半胡粉龍骨煅各一錢上為末敷患處臍突嬰兒蘊熱在腹中伸引頻頻臥不寧努脹其氣衝臍本虛大光浮臍突成速服犀角消毒飲方二豆方能消腫赤攻最忌寒涼敷臍上冰凝毒熱反成凶附方犀角消毒飲牛蒡子炒研生甘草荊芥防風金銀花水煎熟臨服入犀角細末調勻服方歌犀角消毒牛蒡加甘草荊防金銀花細研犀角調勻服臍突能消功最佳二豆散赤小豆不去皮豆豉天南星去皮臍白蘞各一錢上為細末用五分芭蕉汁調敷臍四旁日二次臍風斷臍不慎起臍風感受風寒濕水成將成驅風散方最效已成兼證要分明腹脹便祕黑白散方面白肢寒用理中方痰涎壅盛殭蠶散方壯熱面赤龍膽方清嘔吐多啼益脾方治唇青撮口撮風方平臍青口噤為不治一臘逢之命必傾附方驅風散蘇葉防風陳皮厚朴姜炒枳殼麩炒木香煨殭蠶炒釣藤鉤生甘草引用生薑水煎服方歌臍風將作用驅風蘇防陳朴枳香從殭蠶鉤藤與甘草生薑加入更通靈黑白散理中湯辰砂殭蠶散龍膽湯益脾散白茯苓人參草果煨木香煨炙甘草陳皮厚朴姜炒紫蘇子炒各等分上為末每服一錢薑棗湯調服撮風散天釣天釣邪熱積心胸痰涎壅盛氣不通瘛瘲壯熱同驚證頭目仰視若釣形九龍控涎方醫搐掣牛黃散方用善驅風瘛瘲減參鉤藤飲方爪甲青色蘇合方精附方九龍控涎散赤腳蜈蚣酒塗炙乾一條滴乳天竺黃各一錢二味研勻臘茶雄黃炙甘草各二兩荊芥穗炒白礬枯各一錢緑豆半生半熟一百粒上為末每服五分人參薄荷湯調下牛黃散牛黃細研一錢硃砂水飛細研一錢麝香五分天竺黃二錢蠍梢一錢釣藤鉤二錢研勻每服一字新汲水調下鉤藤飲人參全竭去毒羚羊角天麻甘草炙釣藤鉤水煎服方歌天釣須用鉤藤飲瘛瘲連連無止歇人參羚羊與鉤藤炙草天麻共全蠍蘇合香丸內釣內釣肝臟病受寒糞青潮搐似驚癇傴僂腹痛吐涎沫紅絲血點目中纏瘛瘲甚者鉤藤飲方急啼腹痛木香丸方肢冷甲青唇口黑養臟方溫中或保全附方鉤藤飲木香丸沒藥木香煨茴香炒釣藤鉤全蠍乳香各等分先將乳香沒藥研勻後入諸藥末和畢取大蒜少許研細和丸如桐子大曬乾每次二丸鉤藤湯下養臟散當歸沉香木香煨肉桂川芎各半兩丁香二錢上為末每服一錢淡薑湯調服盤腸氣痛盤腸寒搏腸中痛曲腰不乳蹙雙眉定痛溫中豆蔻散方尉臍外治方法堪垂附方白豆蔻散白豆蔻砂仁青皮醋炒陳皮炙甘草香附米制蓬莪朮各等分上為末各服一錢紫蘇煎湯調下尉臍法淡豆豉生薑切碎各二錢蔥白五莖食鹽一兩同炒熱置臍上尉之初生門下原書卷次第五十一目爛兒生兩目痛難睜胞邊赤爛胎熱攻內用地黃湯方清熱外點真金方目即明附方生地黃湯真金散黃連生黃柏生當歸赤芍藥各一錢杏仁炒去皮尖五分上銼散乳汁浸一宿曬乾為極細末用生地黃汁調